{{- if not .Values.credentials.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "soma.fullname" . }}
  labels:
    {{- include "soma.labels" . | nindent 4 }}
type: Opaque
stringData:
  SOMA_ACCESS_KEY: {{ .Values.credentials.accessKey | quote }}
  SOMA_SECRET_KEY: {{ .Values.credentials.secretKey | quote }}
{{- end }}
