apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "soma.metaName" . }}
  labels:
    {{- include "soma.labels" (dict "root" . "component" "meta") | nindent 4 }}
data:
  soma.toml: |
    role = "meta"
    listen = "0.0.0.0:{{ .Values.ports.meta }}"
    data_dir = {{ .Values.config.dataDir | quote }}
    # The rebalance controller (meta role) needs the durability mode: replica
    # factor for replication, or k+m for erasure (which decides how it reconstructs
    # data during migration / self-heal).
    replication_factor = {{ .Values.replication.factor }}

    [erasure]
    enabled = {{ .Values.erasure.enabled }}
    data_shards = {{ .Values.erasure.dataShards }}
    parity_shards = {{ .Values.erasure.parityShards }}

    [rebalance]
    enabled = {{ .Values.rebalance.enabled }}
    interval_secs = {{ .Values.rebalance.intervalSecs }}
    settle_secs = {{ .Values.rebalance.settleSecs }}
    max_copies_per_pass = {{ .Values.rebalance.maxCopiesPerPass }}
    down_after_secs = {{ .Values.rebalance.downAfterSecs }}
    max_garbage_per_pass = {{ .Values.rebalance.maxGarbagePerPass }}
