apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "soma.storageName" . }}
  labels:
    {{- include "soma.labels" (dict "root" . "component" "storage") | nindent 4 }}
data:
  soma.toml: |
    role = "storage"
    listen = "0.0.0.0:{{ .Values.ports.storage }}"
    data_dir = {{ .Values.config.dataDir | quote }}
    # node_id + advertise_endpoint are injected per-pod via env (see the
    # StatefulSet); meta_endpoint is where each node registers its membership.
    meta_endpoint = "{{ include "soma.metaEndpoint" . }}"

    [storage]
    volume_max = "{{ .Values.config.volumeMax }}"
    durability = {{ .Values.config.durability | quote }}
    scrub_interval_secs = {{ .Values.config.scrubIntervalSecs }}
    heartbeat_interval_secs = {{ .Values.config.heartbeatIntervalSecs }}
    compact_interval_secs = {{ .Values.config.compactIntervalSecs }}
    compact_min_reclaim_ratio = {{ .Values.config.compactMinReclaimRatio }}
