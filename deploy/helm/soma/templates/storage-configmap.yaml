apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "soma.storageName" . }}
  labels:
    {{- include "soma.labels" (dict "root" . "component" "storage") | nindent 4 }}
data:
  soma.toml: |
    role = "storage"
    listen = "0.0.0.0:{{ .Values.ports.storage }}"
    data_dir = {{ .Values.config.dataDir | quote }}

    [storage]
    volume_max = "{{ .Values.config.volumeMax }}"
    scrub_interval_secs = {{ .Values.config.scrubIntervalSecs }}
