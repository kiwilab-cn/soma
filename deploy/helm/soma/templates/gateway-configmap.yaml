{{- if and .Values.erasure.enabled (lt (int .Values.storage.replicaCount) (add (int .Values.erasure.dataShards) (int .Values.erasure.parityShards))) }}
{{- fail "erasure.enabled requires storage.replicaCount >= erasure.dataShards + erasure.parityShards" }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "soma.gatewayName" . }}
  labels:
    {{- include "soma.labels" (dict "root" . "component" "gateway") | nindent 4 }}
data:
  soma.toml: |
    role = "gateway"
    listen = "0.0.0.0:{{ .Values.ports.s3 }}"
    admin_listen = "0.0.0.0:{{ .Values.ports.admin }}"
    data_dir = "/tmp/soma"
    meta_endpoint = "{{ include "soma.metaEndpoint" . }}"
    # Max single-part PUT body buffered in gateway memory (objects above it must use
    # multipart). Default = S3's 5 GiB ceiling; lower to bound per-request memory.
    max_request_body = "{{ .Values.gateway.maxRequestBody }}"
    replication_factor = {{ .Values.replication.factor }}
    write_quorum = {{ .Values.replication.writeQuorum }}
    # The gateway discovers its storage node set from the cluster membership
    # table (storage nodes self-register), not from static endpoints, and
    # refreshes placement (membership + PG table) on this interval.
    placement_refresh_secs = {{ .Values.replication.placementRefreshSecs }}

    [cache]
    enabled = {{ .Values.config.cache.enabled }}
    max_bytes = "{{ .Values.config.cache.maxBytes }}"
    max_object_bytes = "{{ .Values.config.cache.maxObjectBytes }}"

    [erasure]
    enabled = {{ .Values.erasure.enabled }}
    data_shards = {{ .Values.erasure.dataShards }}
    parity_shards = {{ .Values.erasure.parityShards }}
    write_quorum = {{ .Values.erasure.writeQuorum }}

    [encryption]
    # The master key is injected at runtime via SOMA_MASTER_KEY (from the Secret),
    # never rendered here.
    chunk_size_bytes = {{ .Values.encryption.chunkSizeBytes }}
