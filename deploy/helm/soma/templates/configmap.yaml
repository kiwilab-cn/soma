apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "soma.fullname" . }}
  labels:
    {{- include "soma.labels" . | nindent 4 }}
data:
  soma.toml: |
    listen = "0.0.0.0:{{ .Values.ports.s3 }}"
    admin_listen = "0.0.0.0:{{ .Values.ports.admin }}"
    data_dir = {{ .Values.config.dataDir | quote }}

    [storage]
    volume_max = {{ .Values.config.volumeMax | quote }}

    [cache]
    enabled = {{ .Values.config.cache.enabled }}
    max_bytes = {{ .Values.config.cache.maxBytes | quote }}
    max_object_bytes = {{ .Values.config.cache.maxObjectBytes | quote }}
