apiVersion: v1
kind: Service
metadata:
  name: {{ include "soma.fullname" . }}
  labels:
    {{- include "soma.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "soma.selectorLabels" . | nindent 4 }}
  ports:
    - name: s3
      port: {{ .Values.ports.s3 }}
      targetPort: s3
      protocol: TCP
    - name: admin
      port: {{ .Values.ports.admin }}
      targetPort: admin
      protocol: TCP
---
# Headless service: stable per-pod DNS for the StatefulSet (ready for M2).
apiVersion: v1
kind: Service
metadata:
  name: {{ include "soma.headlessName" . }}
  labels:
    {{- include "soma.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "soma.selectorLabels" . | nindent 4 }}
  ports:
    - name: s3
      port: {{ .Values.ports.s3 }}
      targetPort: s3
      protocol: TCP
