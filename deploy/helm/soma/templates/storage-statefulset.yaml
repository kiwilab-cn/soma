apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "soma.storageName" . }}
  labels:
    {{- include "soma.labels" (dict "root" . "component" "storage") | nindent 4 }}
spec:
  replicas: {{ .Values.storage.replicaCount }}
  serviceName: {{ include "soma.storageHeadless" . }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "soma.selectorLabels" (dict "root" . "component" "storage") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "soma.selectorLabels" (dict "root" . "component" "storage") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/storage-configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: soma
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["--config", "/etc/soma/soma.toml"]
          env:
            # Per-pod stable identity + advertised address for cluster membership.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SOMA_NODE_ID
              value: "$(POD_NAME)"
            - name: SOMA_ADVERTISE_ENDPOINT
              value: "http://$(POD_NAME).{{ include "soma.storageHeadless" . }}.{{ .Release.Namespace }}.svc:{{ .Values.ports.storage }}"
          ports:
            - name: storage
              containerPort: {{ .Values.ports.storage }}
          livenessProbe:
            tcpSocket:
              port: storage
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: storage
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.storage.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/soma
              readOnly: true
            - name: data
              mountPath: {{ .Values.config.dataDir }}
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: {{ include "soma.storageName" . }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          {{- toYaml .Values.storage.persistence.accessModes | nindent 10 }}
        {{- if .Values.storage.persistence.storageClass }}
        storageClassName: {{ .Values.storage.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.storage.persistence.size | quote }}
