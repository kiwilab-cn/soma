apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "soma.storageName" . }}
  labels:
    {{- include "soma.labels" (dict "root" . "component" "storage") | nindent 4 }}
spec:
  replicas: {{ .Values.storage.replicaCount }}
  serviceName: {{ include "soma.storageHeadless" . }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "soma.selectorLabels" (dict "root" . "component" "storage") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "soma.selectorLabels" (dict "root" . "component" "storage") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/storage-configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.storage.localRead.enabled }}
      initContainers:
        # Prepare the shared socket directory so the non-root soma process can bind
        # the socket and co-located compute (any uid) can connect. Runs as root only
        # to fix the hostPath directory's ownership/permissions.
        - name: prepare-localfd-dir
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - mkdir -p {{ .Values.storage.localRead.hostPath }} && chmod 0777 {{ .Values.storage.localRead.hostPath }}
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: localfd
              mountPath: {{ .Values.storage.localRead.hostPath }}
      {{- end }}
      containers:
        - name: soma
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["--config", "/etc/soma/soma.toml"]
          env:
            # Per-pod stable identity + advertised address for cluster membership.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SOMA_NODE_ID
              value: "$(POD_NAME)"
            - name: SOMA_ADVERTISE_ENDPOINT
              value: "http://$(POD_NAME).{{ include "soma.storageHeadless" . }}.{{ .Release.Namespace }}.svc:{{ .Values.ports.storage }}"
            # Physical host — the unit at which co-located compute can short-circuit
            # to local storage (data-locality reads). The node name is the host key.
            - name: SOMA_HOST
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- if .Values.storage.zone }}
            # Failure domain (AZ/rack). Node labels (topology.kubernetes.io/zone)
            # aren't exposable via the downward API, so set it per nodepool here, or
            # populate it with an init container that reads the node's zone label.
            - name: SOMA_ZONE
              value: {{ .Values.storage.zone | quote }}
            {{- end }}
            {{- if .Values.storage.localRead.enabled }}
            # Bind the local short-circuit read socket on the shared hostPath.
            - name: SOMA_LOCAL_SOCKET_PATH
              value: "{{ .Values.storage.localRead.hostPath }}/{{ .Values.storage.localRead.socketName }}"
            {{- end }}
          ports:
            - name: storage
              containerPort: {{ .Values.ports.storage }}
          livenessProbe:
            tcpSocket:
              port: storage
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: storage
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.storage.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/soma
              readOnly: true
            - name: data
              mountPath: {{ .Values.config.dataDir }}
            - name: tmp
              mountPath: /tmp
            {{- if .Values.storage.localRead.enabled }}
            - name: localfd
              mountPath: {{ .Values.storage.localRead.hostPath }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "soma.storageName" . }}
        - name: tmp
          emptyDir: {}
        {{- if .Values.storage.localRead.enabled }}
        # Node-local directory holding the short-circuit socket, shared with
        # co-located compute pods that mount the same hostPath.
        - name: localfd
          hostPath:
            path: {{ .Values.storage.localRead.hostPath }}
            type: DirectoryOrCreate
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          {{- toYaml .Values.storage.persistence.accessModes | nindent 10 }}
        {{- if .Values.storage.persistence.storageClass }}
        storageClassName: {{ .Values.storage.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.storage.persistence.size | quote }}
