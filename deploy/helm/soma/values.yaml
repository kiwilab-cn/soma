# Default values for the soma chart (M2: three-role distributed topology).
#
# One image, three roles:
#   - gateway : stateless S3 front-end (Deployment, scalable)
#   - meta    : metadata node (StatefulSet, single replica in M2)
#   - storage : storage nodes (StatefulSet, N replicas, quorum-replicated)

image:
  repository: soma
  # Defaults to the chart appVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Listen ports for each role.
ports:
  s3: 9000      # gateway S3 endpoint
  admin: 9001   # gateway health + metrics
  meta: 9100    # metadata gRPC
  storage: 9200 # storage gRPC

# Durability policy (gateway). By default objects are N-way replicated. Enable
# erasure coding to stripe them as Reed-Solomon k+m instead — cheaper storage for
# the same fault tolerance. Requires storage.replicaCount >= dataShards +
# parityShards.
replication:
  factor: 3
  writeQuorum: 2
  # How often (seconds) the gateway refreshes placement so node joins and PG
  # migrations are picked up live.
  placementRefreshSecs: 10

# Online rebalance controller (meta role). The mover is throttled so migration
# uses spare bandwidth and never disturbs foreground throughput.
rebalance:
  enabled: true
  intervalSecs: 30
  # Minimum seconds a PG migrates before finalize (>= placementRefreshSecs).
  settleSecs: 30
  maxCopiesPerPass: 64
  # Seconds without a heartbeat before a node is marked Down (self-heal trigger).
  downAfterSecs: 90
  # Orphaned object ids the GC reclaims per pass (overwrites/deletes/multipart parts).
  maxGarbagePerPass: 256

erasure:
  enabled: false
  dataShards: 4
  parityShards: 2
  # Shard writes that must ack (0 => dataShards + 1).
  writeQuorum: 0

# Shared object/cache config rendered into each role's soma.toml.
config:
  dataDir: /var/lib/soma
  volumeMax: "4GiB"
  scrubIntervalSecs: 3600
  # Storage-node membership heartbeat interval (0 disables registration).
  heartbeatIntervalSecs: 10
  # Volume compaction (space reclamation) interval (0 disables); only compact a
  # volume when at least this fraction of it is dead.
  compactIntervalSecs: 3600
  compactMinReclaimRatio: 0.2
  cache:
    enabled: true
    maxBytes: "512MiB"
    maxObjectBytes: "1MiB"

# Access credentials. A Secret is created from these unless `existingSecret` is
# set, in which case that Secret must provide SOMA_ACCESS_KEY / SOMA_SECRET_KEY.
credentials:
  accessKey: soma
  secretKey: soma-secret
  existingSecret: ""

# Envelope encryption at rest (applied at the gateway, below the cache, above
# replication — storage nodes only ever see ciphertext). When enabled, supply a
# base64-encoded 32-byte master key here, or provide it as SOMA_MASTER_KEY via
# `credentials.existingSecret`. The key is delivered through the Secret (env),
# never written into the ConfigMap.
encryption:
  masterKey: ""
  # Plaintext chunk size for the seekable chunked AEAD (0 = 64 KiB default).
  chunkSizeBytes: 0

# Per-bucket QoS (storage quota + request rate limit) is configured at runtime via
# the admin API, not in this chart — defaults are off (unlimited). Set a quota with
#   PUT /admin/quota?bucket=<name>&max_bytes=10GiB&max_objects=0
# and a rate limit with
#   PUT /admin/ratelimit?bucket=<name>&rps=500&burst=1000
# on the admin port; read current config + usage with GET /admin/quota?bucket=<name>.
#
# Per-bucket access policy is also runtime + admin-API. A bucket is owned by its
# creator's access key (create→own); the owner writes, reads follow the policy. Set
# it with:
#   PUT /admin/bucket-policy?bucket=<name>&owner=<key>&public_read=true|false&readers=k1,k2
# An unowned bucket stays open (any valid key reads/writes) — the single-tenant
# default. Mark a shared bucket public_read=true for read-all (writes stay
# owner-only). Read it with GET /admin/bucket-policy?bucket=<name>.

gateway:
  replicaCount: 2
  # Max single-part PUT body the gateway buffers in memory (human-readable). Objects
  # larger than this must use multipart upload. Default = S3's single-PUT ceiling
  # (5 GiB); lower it (e.g. "1GiB") to bound per-request memory. Also settable via
  # the SOMA_MAX_REQUEST_BODY env var. See docs/OBJECT_SIZING.md.
  maxRequestBody: "5GiB"
  service:
    type: ClusterIP
    annotations: {}
  resources: {}

meta:
  persistence:
    size: 10Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
  resources: {}

storage:
  replicaCount: 3
  # Failure domain (AZ/rack) reported for data-locality scheduling. The host is
  # auto-detected from the node name; zone can't be read from node labels via the
  # downward API, so set it here per nodepool (or wire an init container). Empty =
  # unknown (locality still works at host granularity).
  zone: ""
  # Local short-circuit reads: bind a unix socket on a node-local hostPath so
  # co-located compute pods read object bytes via a passed file descriptor,
  # bypassing the gateway and the network (see docs/LOCALITY_DESIGN.md §2a/§4).
  # Off by default. SINGLE-TENANT / dedicated deployments only until per-tenant
  # socket scoping lands (§6): the socket has no auth, so any pod that mounts the
  # hostPath can read every object on the node. Enabling it adds a hostPath mount
  # and a root init container that prepares the socket directory.
  localRead:
    enabled: false
    # Node directory holding the socket, shared with co-located compute pods. For
    # multiple soma clusters per node, override this to a unique path.
    hostPath: /run/soma
    # Socket file name within hostPath.
    socketName: storage.sock
  persistence:
    size: 100Gi
    # For data-locality (short-circuit) reads, point this at a NODE-LOCAL storage
    # class — a `local` PV / local-path provisioner (e.g. TopoLVM, the sig-storage
    # local-static-provisioner, OpenEBS LocalPV, or Rancher local-path), NOT network
    # block storage (EBS/PD/Ceph-RBD). A local PV is still a PVC, but its nodeAffinity
    # pins the pod to the node holding its disk, so the bytes are truly local and the
    # reported `host` is stable. Durability is handled by soma's own replication/EC
    # across nodes, so pinning to a node is the intended trade-off (local speed +
    # cluster-level durability). Empty = the cluster default class (often network
    # storage, which forfeits true locality). See docs/LOCALITY_DESIGN.md §5.
    storageClass: ""
    accessModes:
      - ReadWriteOnce
  resources: {}

# Non-root (matches the image's uid 10001).
podSecurityContext:
  fsGroup: 10001
securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
